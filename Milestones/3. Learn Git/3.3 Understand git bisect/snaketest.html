<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-container {
      text-align: center;
    }

    canvas {
      background: #222;
      border: 2px solid #fff;
      display: block;
      margin: 16px auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      margin: 6px 0;
    }

    button {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>Snake Game</h1>
    <p>Score: <span id="score">0</span></p>
    <p>Use arrow keys to move</p>
    <canvas id="game" width="400" height="400"></canvas>
    <button id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake;
    let direction;
    let nextDirection;
    let food;
    let score;
    let gameOver;
    let gameLoop;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      food = randomFoodPosition();
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;

      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, 120);
    }

    function randomFoodPosition() {
      let newFood;

      while (true) {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };

        const onSnake = snake && snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
        if (!onSnake) return newFood;
      }
    }

    function update() {
      if (gameOver) return;

      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount
      ) {
        endGame();
        return;
      }

      // Self collision
      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      // Food collision
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        food = randomFoodPosition();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Clear board
      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#00ff88" : "#33cc66";
        ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
      }
    }

    function endGame() {
      gameOver = true;
      clearInterval(gameLoop);

      ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp" && direction.y !== 1) {
        nextDirection = { x: 0, y: -1 };
      } else if (e.key === "ArrowDown" && direction.y !== -1) {
        nextDirection = { x: 0, y: 1 };
      } else if (e.key === "ArrowLeft" && direction.x !== 1) {
        nextDirection = { x: -1, y: 0 };
      } else if (e.key === "ArrowRight" && direction.x !== -1) {
        nextDirection = { x: 1, y: 0 };
      }
    });

    restartBtn.addEventListener("click", initGame);

    initGame();
    draw();
  </script>
</body>
</html>
